# ===============================
# SERVER CONFIG
# ===============================
server.port=8081
spring.application.name=sme-lend-backend


# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/sme_lend?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false


# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/v3/api-docs


# ===============================
# SECURITY (temporary for dev)
# ===============================
spring.security.user.name=admin
spring.security.user.password=admin


# ===============================
# JWT
# ===============================
jwt.secret=smelend-super-secure-secret-key-2026-backend-very-safe
jwt.exp-minutes=120